<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>던전 오브 팀즈 — 관리자</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; color: white; font-family: Arial, sans-serif; padding: 16px; }
    h1 { color: #ffd700; font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #aaa; font-size: 12px; margin-bottom: 16px; }

    .status-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
    .stat-card { background: #1a1a2e; border: 1px solid #333; border-radius: 10px; padding: 10px; text-align: center; }
    .stat-label { font-size: 10px; color: #aaa; margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: bold; color: #ffd700; }

    .section { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .section-title { font-size: 13px; font-weight: bold; color: #ffd700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #333; }

    .btn { padding: 10px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.15s; }
    .btn:hover { opacity: 0.85; transform: scale(0.98); }
    .btn-primary { background: #ffd700; color: #0f0f1a; }
    .btn-danger  { background: #e74c3c; color: white; }
    .btn-info    { background: #3498db; color: white; }
    .btn-success { background: #2ecc71; color: white; }
    .btn-purple  { background: #9b59b6; color: white; }
    .btn-gray    { background: #555; color: white; }
    .btn-orange  { background: #e67e22; color: white; }
    .btn-sm   { padding: 6px 12px; font-size: 11px; }
    .btn-full { width: 100%; margin-bottom: 8px; }
    .btn-row  { display: flex; gap: 8px; flex-wrap: wrap; }

    .selection-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 8px; margin-bottom: 10px; }
    .sel-card { background: #0f0f1a; border: 1px solid #333; border-radius: 8px; padding: 8px 10px; font-size: 12px; }
    .sel-card.done    { border-color: #2ecc71; background: #0a1f0a; }
    .sel-card.active  { border-color: #ffd700; background: #1a1a0a; }
    .sel-card.waiting { border-color: #555; }
    .sel-team   { font-weight: bold; color: white; margin-bottom: 3px; }
    .sel-action.chosen  { color: #2ecc71; font-size: 11px; }
    .sel-action.pending { color: #555;    font-size: 11px; }

    .prob-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .prob-bar-bg   { flex: 1; background: #333; border-radius: 999px; height: 8px; overflow: hidden; }
    .prob-bar-fill { height: 100%; background: #ffd700; border-radius: 999px; }
    .prob-pct      { font-size: 13px; font-weight: bold; color: #ffd700; min-width: 36px; text-align: right; }

    /* 현재 판정 팀 강조 박스 */
    .judge-team-box {
      background: #0f0f1a; border: 1px solid #ffd70055;
      border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
    }
    .judge-team-name   { font-size: 18px; font-weight: bold; color: #ffd700; }
    .judge-team-action { font-size: 13px; color: #aaa; margin-top: 4px; }
    .judge-team-gold   { font-size: 12px; color: #7ecfff; margin-top: 2px; }

    .team-row { display: grid; grid-template-columns: 28px 1fr auto auto auto; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; background: #0f0f1a; border: 1px solid #333; font-size: 12px; }
    .team-row.active-turn { border-color: #ffd700; background: #1a1a10; }
    .team-row.pirate-row  { border-color: #e74c3c44; }
    .team-job-icon  { font-size: 18px; text-align: center; }
    .team-name-cell { font-weight: bold; }
    .team-name-cell span { font-size: 10px; color: #aaa; font-weight: normal; }
    .team-gold-cell { color: #ffd700; font-size: 12px; white-space: nowrap; }
    .team-pt-cell   { color: #7ecfff; font-size: 12px; white-space: nowrap; }

    .gold-adj { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    .gold-adj select, .gold-adj input { background: #0f0f1a; border: 1px solid #444; border-radius: 6px; color: white; padding: 6px 8px; font-size: 12px; }
    .gold-adj select { flex: 1; }
    .gold-adj input  { width: 90px; }

    .round-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .round-pill  { padding: 4px 12px; border-radius: 999px; font-size: 11px; border: 1px solid #444; color: #aaa; }
    .round-pill.done   { background: #2ecc7133; border-color: #2ecc71; color: #2ecc71; }
    .round-pill.active { background: #ffd70033; border-color: #ffd700; color: #ffd700; font-weight: bold; }
    .round-pill.locked { color: #555; border-color: #333; }

    .event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .event-btn  { background: #0f0f1a; border: 1px solid #444; border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; color: white; font-size: 11px; transition: all 0.15s; }
    .event-btn:hover { border-color: #9b59b6; background: #1a0a2e; }
    .event-icon { font-size: 20px; margin-bottom: 2px; }
    .event-name { font-weight: bold; font-size: 11px; }
    .event-desc { font-size: 10px; color: #aaa; margin-top: 2px; }

    .boss-hp-bar  { background: #333; border-radius: 999px; height: 16px; overflow: hidden; margin: 8px 0; }
    .boss-hp-fill { height: 100%; background: linear-gradient(90deg,#e74c3c,#ff8888); border-radius: 999px; transition: width 0.5s; }
    .boss-hp-text { font-size: 12px; color: #ff8888; text-align: center; }

    .log-box  { background: #0a0a14; border: 1px solid #222; border-radius: 8px; padding: 8px 10px; font-size: 11px; max-height: 150px; overflow-y: auto; font-family: monospace; }
    .log-line { margin-bottom: 3px; color: #888; }
    .log-line.ok  { color: #2ecc71; }
    .log-line.err { color: #e74c3c; }
    .log-line.sys { color: #ffd700; }

    #resetConfirm { display: none; margin-top: 8px; }

    .phase-banner { padding: 10px 14px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; font-weight: bold; text-align: center; }
    .phase-selecting { background: #1a2a1a; border: 1px solid #2ecc71; color: #2ecc71; }
    .phase-judging   { background: #1a1a0a; border: 1px solid #ffd700; color: #ffd700; }
    .phase-result    { background: #0a1a2a; border: 1px solid #3498db; color: #7ecfff; }
    .phase-boss      { background: #2a0a0a; border: 1px solid #e74c3c; color: #ff8888; }

    .result-badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: bold; margin-bottom: 8px;
    }
    .badge-success { background: #2ecc7133; color: #2ecc71; border: 1px solid #2ecc71; }
    .badge-fail    { background: #e74c3c33; color: #e74c3c; border: 1px solid #e74c3c; }
  </style>
</head>
<body>

  <h1>⚙ 관리자 페이지</h1>
  <p class="subtitle">던전 오브 팀즈 — MC 전용 컨트롤 패널</p>

  <div class="status-bar">
    <div class="stat-card"><div class="stat-label">라운드</div><div class="stat-value" id="statRound">-</div></div>
    <div class="stat-card"><div class="stat-label">페이즈</div><div class="stat-value" style="font-size:12px;" id="statPhase">대기</div></div>
    <div class="stat-card"><div class="stat-label">참가 팀</div><div class="stat-value" id="statTeams">0</div></div>
    <div class="stat-card"><div class="stat-label">선택 완료</div><div class="stat-value" id="statSelections">0/0</div></div>
  </div>

  <!-- 게임 제어 -->
  <div class="section">
    <div class="section-title">🎮 게임 제어</div>
    <div class="round-pills" id="roundPills"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startGame()">게임 시작</button>
      <button class="btn btn-orange"  onclick="startJudging()">결과 처리 시작</button>
      <button class="btn btn-info"    onclick="nextTurn()">다음 팀 →</button>
      <button class="btn btn-success" onclick="nextRound()">다음 라운드</button>
      <button class="btn btn-purple"  onclick="startBoss()">보스전 시작</button>
    </div>
    <div style="margin-top:8px;">
      <button class="btn btn-gray btn-sm" onclick="toggleReset()">게임 리셋</button>
      <div id="resetConfirm">
        <span style="font-size:12px;color:#e74c3c;">정말 리셋할까요?</span>
        <div class="btn-row" style="margin-top:6px;">
          <button class="btn btn-danger btn-sm" onclick="resetGame()">리셋 확인</button>
          <button class="btn btn-gray   btn-sm" onclick="toggleReset()">취소</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 선택 현황 -->
  <div class="section">
    <div class="section-title">📋 팀별 선택 현황</div>
    <div id="phaseBanner"></div>
    <div style="font-size:11px;color:#aaa;margin-bottom:8px;" id="selProgress"></div>
    <div class="selection-grid" id="selectionGrid"></div>
  </div>

  <!-- 판정 -->
  <div class="section">
    <div class="section-title">🎲 자동 확률 판정</div>
    <div class="judge-team-box" id="judgeTeamBox">
      <div class="judge-team-name"   id="judgeTeamName">대기 중...</div>
      <div class="judge-team-action" id="judgeTeamAction">결과 처리 시작 버튼을 누르세요</div>
      <div class="judge-team-gold"   id="judgeTeamGold"></div>
    </div>
    <div id="judgeBox">
      <div style="color:#555;font-size:12px;padding:8px;">결과 처리 시작 버튼을 누르면 팀별로 판정할 수 있습니다.</div>
    </div>
  </div>

  <!-- 팀 현황 -->
  <div class="section">
    <div class="section-title">👥 팀 현황</div>
    <div id="teamList"></div>
    <div style="margin-top:10px;">
      <div style="font-size:11px;color:#aaa;margin-bottom:4px;">골드 수동 조정</div>
      <div class="gold-adj">
        <select id="goldTeamSel"></select>
        <input type="number" id="goldAmount" value="500">
        <button class="btn btn-success btn-sm" onclick="adjustGold(1)">+지급</button>
        <button class="btn btn-danger  btn-sm" onclick="adjustGold(-1)">-차감</button>
      </div>
    </div>
    <div style="margin-top:8px;">
      <div style="font-size:11px;color:#aaa;margin-bottom:4px;">포인트 수동 조정</div>
      <div class="gold-adj">
        <select id="ptTeamSel"></select>
        <input type="number" id="ptAmount" value="1">
        <button class="btn btn-success btn-sm" onclick="adjustPoints(1)">+지급</button>
        <button class="btn btn-danger  btn-sm" onclick="adjustPoints(-1)">-차감</button>
      </div>
    </div>
  </div>

  <!-- 이벤트 카드 -->
  <div class="section">
    <div class="section-title">🃏 이벤트 카드 발동</div>
    <div class="event-grid" id="eventGrid"></div>
  </div>

  <!-- 보스전 -->
  <div class="section" id="bossSection" style="display:none;">
    <div class="section-title">👹 보스 HP 관리</div>
    <div class="boss-hp-bar"><div class="boss-hp-fill" id="bossHpFill" style="width:100%"></div></div>
    <div class="boss-hp-text" id="bossHpText">HP: - / -</div>
    <div class="gold-adj" style="margin-top:8px;">
      <input type="number" id="bossDmgInput" value="2000">
      <select id="bossDmgTeam"></select>
      <button class="btn btn-danger btn-sm" onclick="dealBossDamage()">데미지 적용</button>
    </div>
  </div>

  <!-- 최종 점수 -->
  <div class="section" id="finalSection" style="display:none;">
    <div class="section-title">🏆 최종 점수 계산</div>
    <div id="finalScores"></div>
    <button class="btn btn-primary btn-full" style="margin-top:10px;" onclick="calcFinal()">최종 점수 계산</button>
  </div>

  <!-- 로그 -->
  <div class="section">
    <div class="section-title">📋 활동 로그</div>
    <div class="log-box" id="logBox"></div>
  </div>

  <script type="module">
  import { db, ref, set, onValue, update, get } from "../shared/firebase.js";

    const JOB_ICONS = { warrior:'⚔️', mage:'🔮', archer:'🏹', healer:'✨', pirate:'🏴‍☠️' };
    const JOB_NAMES = { warrior:'전사', mage:'마법사', archer:'궁수', healer:'힐러', pirate:'해적' };
    const ACTION_NAMES = { quest:'퀘스트 도전', enhance:'아이템 강화', fate:'운명카드', auction:'경매', plunder:'약탈' };
    const ROUNDS = ['준비','R1 튜토리얼','R2 본격시작','R3 운명의밤','R4 전략','R5 역전의기회','R6 보스전'];
    const ENHANCE_COST = [0,500,1000,2000,3500,6000];
    const ENHANCE_PROB = [0,0.90,0.75,0.55,0.35,0.15];
    const EVENTS = [
      { key:'gold2x',  icon:'💰', name:'황금의 축복',  desc:'현재 팀 골드 2배',           color:'#f39c12' },
      { key:'curse',   icon:'💀', name:'저주의 덫',    desc:'1위 팀 골드 -20%',           color:'#e74c3c' },
      { key:'steal',   icon:'🦊', name:'부의 이전',    desc:'1위→꼴찌 골드 10% 이전',    color:'#9b59b6' },
      { key:'genius',  icon:'🧠', name:'천재의 영감',  desc:'현재 팀 퀘스트 자동성공',    color:'#3498db' },
      { key:'reverse', icon:'🔄', name:'운명의 역전',  desc:'1위↔꼴찌 포인트 차이 절반', color:'#e74c3c' },
      { key:'allgold', icon:'🎉', name:'전체 보너스',  desc:'전 팀 골드 +500',            color:'#2ecc71' },
    ];

    let teamsData  = {};
    let gameState  = {};
    // 현재 판정 중인 팀 정보를 로컬에 저장
    let currentJudgeTid    = null;
    let currentJudgeAction = null;
    let pendingResult      = null;

    // ── Firebase 감지 ────────────────────────────────────────
    onValue(ref(db,'teams'), (snap) => {
      teamsData = snap.val() || {};
      renderTeamList();
      renderSelects();
      document.getElementById('statTeams').textContent = Object.keys(teamsData).length;
      renderSelectionGrid();
    });

    onValue(ref(db,'gameState'), (snap) => {
      gameState = snap.val() || {};
      updateStatusBar();
      updateRoundPills();
      updatePhaseBanner();
      renderSelectionGrid();
      updateBossSection();
    });

    // ── 상태바 ───────────────────────────────────────────────
    function updateStatusBar() {
      document.getElementById('statRound').textContent = gameState.currentRound || '-';
      document.getElementById('statPhase').textContent = gameState.phase || '대기';
      const sels  = gameState.selections || {};
      const teams = Object.keys(teamsData);
      const done  = teams.filter(id => sels[id]).length;
      document.getElementById('statSelections').textContent = `${done}/${teams.length}`;
    }

    // ── 라운드 알약 ──────────────────────────────────────────
    function updateRoundPills() {
      const cur = gameState.currentRound || 0;
      document.getElementById('roundPills').innerHTML = ROUNDS.map((r,i) => {
        let cls = 'round-pill';
        if (i < cur) cls += ' done';
        else if (i === cur) cls += ' active';
        else cls += ' locked';
        return `<div class="${cls}">${r}</div>`;
      }).join('');
    }

    // ── 페이즈 배너 ──────────────────────────────────────────
    function updatePhaseBanner() {
      const phase  = gameState.phase;
      const banner = document.getElementById('phaseBanner');
      const msgs   = {
        selecting: { cls:'phase-selecting', text:'🟢 전 팀 동시 선택 중 — 모든 팀 선택 완료 후 "결과 처리 시작" 클릭' },
        judging:   { cls:'phase-judging',   text:'🟡 결과 처리 중 — 팀별 판정 후 "다음 팀 →" 클릭' },
        result:    { cls:'phase-result',    text:'🔵 라운드 마무리 — "다음 라운드" 클릭' },
        boss:      { cls:'phase-boss',      text:'🔴 보스전 진행 중!' },
      };
      const m = msgs[phase];
      banner.innerHTML = m ? `<div class="phase-banner ${m.cls}">${m.text}</div>` : '';
    }

    // ── 선택 현황 ────────────────────────────────────────────
    function renderSelectionGrid() {
      const sels  = gameState.selections || {};
      const teams = Object.entries(teamsData);
      const done  = teams.filter(([id]) => sels[id]).length;
      document.getElementById('selProgress').textContent =
        gameState.phase === 'selecting' ? `${done} / ${teams.length} 팀 선택 완료` : '';

      document.getElementById('selectionGrid').innerHTML = teams.map(([id,t]) => {
        const action   = sels[id];
        const isActive = id === currentJudgeTid && gameState.phase === 'judging';
        let cls = 'sel-card' + (isActive ? ' active' : action ? ' done' : ' waiting');
        return `<div class="${cls}">
          <div class="sel-team">${JOB_ICONS[t.job]||'❓'} ${t.name}</div>
          <div class="sel-action ${action?'chosen':'pending'}">${action ? ACTION_NAMES[action]||action : '선택 대기 중...'}</div>
        </div>`;
      }).join('') || '<div style="color:#555;font-size:12px;">참가 팀 없음</div>';
    }

    // ── 게임 시작 ────────────────────────────────────────────
    window.startGame = function() {
      const teams = Object.keys(teamsData);
      if (!teams.length) { alert('참가 팀이 없습니다!'); return; }
      update(ref(db,'gameState'), {
        currentRound:1, phase:'selecting',
        selections:null, currentTeamTurn:null,
        currentTeamIndex:0, selectedAction:null, actingTeam:null
      });
      currentJudgeTid = null; currentJudgeAction = null; pendingResult = null;
      renderJudgeBox();
      addLog('게임 시작! R1 — 전 팀 동시 선택 시작', 'sys');
    };

    // ── 결과 처리 시작 ───────────────────────────────────────
window.startJudging = async function() {
      const teams = Object.keys(teamsData);
      if (!teams.length) { alert('참가 팀이 없습니다!'); return; }

      // Firebase에서 최신 selections 직접 읽어오기
      const snap = await get(ref(db, 'gameState/selections'));
      const sels = snap.val() || {};

      const unsel = teams.filter(id => !sels[id]);
      if (unsel.length > 0) {
        const names = unsel.map(id => teamsData[id]?.name || id).join(', ');
        if (!confirm(`아직 선택 안 한 팀: ${names}\n그래도 결과 처리를 시작할까요?`)) return;
      }

      // gameState 로컬 변수도 최신으로 업데이트
      if (!gameState.selections) gameState.selections = {};
      Object.assign(gameState.selections, sels);

      const firstId = teams[0];
      await update(ref(db,'gameState'), {
        phase: 'judging',
        currentTeamTurn: firstId,
        currentTeamIndex: 0
      });

      // 로컬에서 즉시 판정 박스 렌더링
      setCurrentJudge(firstId, 0);
      addLog('결과 처리 시작!', 'sys');
    };

    // ── 현재 판정 팀 설정 ────────────────────────────────────
    function setCurrentJudge(tid, idx) {
      const sels   = gameState.selections || {};
      const action = sels[tid];
      const team   = teamsData[tid];

      currentJudgeTid    = tid;
      currentJudgeAction = action;
      pendingResult      = null;

      // 판정 팀 정보 표시
      document.getElementById('judgeTeamName').textContent =
        team ? `${JOB_ICONS[team.job]||'❓'} ${team.name} (${JOB_NAMES[team.job]||'?'})` : '?';
      document.getElementById('judgeTeamAction').textContent =
        action ? `선택한 액션: ${ACTION_NAMES[action]||action}` : '액션 없음';
      document.getElementById('judgeTeamGold').textContent =
        team ? `현재 골드: ${(team.gold||0).toLocaleString()} | 강화: +${team.itemLevel||0}` : '';

      // 확률 계산
      if (action && team) {
        pendingResult = calcResult(action, tid, team);
        renderJudgeBox();
      } else {
        renderJudgeBox();
      }

      renderSelectionGrid();
    }

    // ── 다음 팀 → ────────────────────────────────────────────
    window.nextTurn = function() {
      if (gameState.phase !== 'judging') { alert('"결과 처리 시작" 버튼을 먼저 누르세요!'); return; }
      const teams = Object.keys(teamsData);
      const cur   = gameState.currentTeamIndex || 0;
      const next  = cur + 1;

      if (next >= teams.length) {
        // 모든 팀 처리 완료
        update(ref(db,'gameState'), { phase:'result', currentTeamTurn:null });
        currentJudgeTid = null; currentJudgeAction = null; pendingResult = null;
        document.getElementById('judgeTeamName').textContent   = '모든 팀 처리 완료!';
        document.getElementById('judgeTeamAction').textContent = '다음 라운드 버튼을 누르세요.';
        document.getElementById('judgeTeamGold').textContent   = '';
        renderJudgeBox();
        addLog('모든 팀 결과 처리 완료!', 'sys');
        return;
      }

      const nextId = teams[next];
      update(ref(db,'gameState'), {
        currentTeamTurn: nextId,
        currentTeamIndex: next
      });
      setCurrentJudge(nextId, next);
      addLog(`다음 팀 → ${teamsData[nextId]?.name||'?'}`, 'sys');
    };

    // ── 확률 계산 ────────────────────────────────────────────
    function calcResult(action, tid, team) {
      if (action === 'quest') {
        let prob = 0.70;
        if (team.job==='warrior'||team.job==='mage') prob = 0.85;
        const success = Math.random() < prob;
        let goldGain  = 0;
        if (success) {
          let base = 500 + Math.floor(Math.random()*500);
          if (team.job==='archer') base = Math.round(base*1.15);
          const itemBonus = [0,0.05,0.10,0.15,0.25,0.40][team.itemLevel||0]||0;
          goldGain = Math.round(base*(1+itemBonus));
        }
        return { action, tid, success, prob, goldGain,
          label: '퀘스트 도전',
          resultText: success ? `✅ 성공 → +${goldGain.toLocaleString()} 골드` : `❌ 실패 → 골드 없음` };

      } else if (action === 'enhance') {
        const lvl = team.itemLevel||0;
        if (lvl >= 5) return { action, tid, success:false, prob:0, cost:0, refund:0,
          label:'아이템 강화', resultText:'⚠️ 이미 최대 강화 (+5)' };
        const prob    = ENHANCE_PROB[lvl+1];
        const cost    = Math.round(ENHANCE_COST[lvl+1]*(team.job==='warrior'?0.9:1));
        const success = Math.random() < prob;
        const refund  = (!success && team.job==='healer') ? Math.round(cost*0.5) : 0;
        return { action, tid, success, prob, cost, refund, lvl,
          label: `아이템 강화 (+${lvl}→+${lvl+1}) · 비용 ${cost.toLocaleString()} G`,
          resultText: success
            ? `✅ 성공 → +${lvl+1}강 달성!`
            : `❌ 실패 → -${(cost-refund).toLocaleString()} 골드${refund?` (힐러 +${refund.toLocaleString()} 환급)`:''}` };

      } else if (action === 'fate') {
        const cards = ['황금의 축복 (골드 2배)','저주의 덫 (타팀 -20%)','천재의 영감 (자동성공)','부의 이전','전설의 부활'];
        const picked = cards[Math.floor(Math.random()*cards.length)];
        return { action, tid, success:true, prob:1, fateCard:picked,
          label:'운명카드', resultText:`🃏 ${picked}` };

      } else if (action === 'auction') {
        return { action, tid, success:true, prob:1,
          label:'경매', resultText:'🏆 MC가 직접 경매를 진행하세요' };

      } else if (action === 'plunder') {
        const targets = Object.entries(teamsData).filter(([id])=>id!==tid);
        if (!targets.length) return { action, tid, success:false, prob:0,
          label:'약탈', resultText:'⚠️ 약탈할 팀 없음' };
        const [victimId, victim] = targets[Math.floor(Math.random()*targets.length)];
        const pct  = 0.05 + Math.random()*0.10;
        const loot = Math.round((victim.gold||0)*pct);
        return { action, tid, success:true, prob:1, loot, victimId, victimName:victim.name,
          label:'약탈 (해적 스킬)',
          resultText:`🏴‍☠️ ${victim.name}에서 ${loot.toLocaleString()} 골드 약탈!` };
      }
      return null;
    }

    // ── 판정 박스 렌더링 ─────────────────────────────────────
    function renderJudgeBox() {
      const box = document.getElementById('judgeBox');
      if (!pendingResult) {
        box.innerHTML = `<div style="color:#555;font-size:12px;padding:8px;">결과 처리 시작 버튼을 누르면 팀별로 판정할 수 있습니다.</div>`;
        return;
      }
      const r       = pendingResult;
      const probPct = Math.round(r.prob*100);
      const resColor= r.success ? '#2ecc71' : '#e74c3c';
      box.innerHTML = `
        <div style="background:#0f0f1a;border:1px solid #ffd70055;border-radius:10px;padding:14px;">
          <div style="font-size:11px;color:#aaa;margin-bottom:8px;">${r.label}</div>
          <div class="prob-bar-wrap">
            <div style="font-size:11px;color:#aaa;white-space:nowrap;">성공 확률</div>
            <div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${probPct}%"></div></div>
            <div class="prob-pct">${probPct}%</div>
          </div>
          <div style="font-size:16px;font-weight:bold;color:${resColor};margin-bottom:12px;">
            🎲 계산 결과: ${r.resultText}
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-success" onclick="confirmResult()">✅ 확정</button>
            <button class="btn btn-gray btn-sm" onclick="flipResult()">🔄 뒤집기</button>
            <button class="btn btn-info  btn-sm" onclick="rerollResult()">🎲 다시 굴리기</button>
          </div>
        </div>`;
    }

    // ── 결과 뒤집기 / 다시굴리기 ────────────────────────────
    window.flipResult = function() {
      if (!pendingResult) return;
      pendingResult.success = !pendingResult.success;
      const r = pendingResult;
      if (r.action==='quest') {
        r.resultText = r.success ? `✅ 성공 → +${r.goldGain.toLocaleString()} 골드` : `❌ 실패 → 골드 없음`;
      } else if (r.action==='enhance') {
        r.resultText = r.success ? `✅ 성공 → +${(r.lvl||0)+1}강 달성!` : `❌ 실패 → 골드 차감`;
      }
      renderJudgeBox();
      addLog('결과 뒤집기', 'sys');
    };

    window.rerollResult = function() {
      if (!currentJudgeTid || !currentJudgeAction) return;
      const team = teamsData[currentJudgeTid];
      if (team) {
        pendingResult = calcResult(currentJudgeAction, currentJudgeTid, team);
        renderJudgeBox();
        addLog('다시 굴리기', 'sys');
      }
    };

    // ── 확정 — 실제 데이터 반영 ─────────────────────────────
    window.confirmResult = async function() {
      const r = pendingResult;
      if (!r) { alert('판정할 결과가 없습니다!'); return; }

      // 최신 팀 데이터 가져오기
      const team = teamsData[r.tid];
      if (!team) { alert('팀 데이터를 찾을 수 없습니다!'); return; }

      addLog(`[${team.name}] ${ACTION_NAMES[r.action]||r.action} 처리 중...`, 'sys');

      try {
        if (r.action === 'quest') {
          if (r.success && r.goldGain > 0) {
            const newGold = (team.gold||0) + r.goldGain;
            await update(ref(db,`teams/${r.tid}`), { gold: newGold });
            addLog(`${team.name} 퀘스트 성공 +${r.goldGain.toLocaleString()} 골드 (→ ${newGold.toLocaleString()})`, 'ok');
          } else {
            addLog(`${team.name} 퀘스트 실패`, 'err');
          }
          update(ref(db,'gameState'), { lastEvent: {
            type: r.success ? 'success' : 'fail',
            title: r.success ? '퀘스트 성공! 🎉' : '퀘스트 실패 💥',
            msg:   r.success ? `${team.name} +${r.goldGain.toLocaleString()} 골드!` : `${team.name} 아쉽지만 다음 기회에!`,
            ts: Date.now()
          }});

        } else if (r.action === 'enhance') {
          const lvl  = team.itemLevel||0;
          const cost = r.cost||0;
          if ((team.gold||0) < cost) { alert(`${team.name} 골드 부족! 필요: ${cost.toLocaleString()}`); return; }
          if (r.success) {
            await update(ref(db,`teams/${r.tid}`), {
              itemLevel: lvl+1,
              gold: Math.max(0,(team.gold||0)-cost)
            });
            addLog(`${team.name} 강화 성공 +${lvl+1}강 (-${cost.toLocaleString()} 골드)`, 'ok');
            update(ref(db,'gameState'), { lastEvent: {
              type:'enhance_success', title:`강화 성공! ⚡`, msg:`${team.name} +${lvl+1}강 달성!`, ts:Date.now()
            }});
          } else {
            const deduct = cost - (r.refund||0);
            await update(ref(db,`teams/${r.tid}`), { gold: Math.max(0,(team.gold||0)-deduct) });
            addLog(`${team.name} 강화 실패 -${deduct.toLocaleString()} 골드`, 'err');
            update(ref(db,'gameState'), { lastEvent: {
              type:'enhance_fail', title:'강화 실패 💔',
              msg:`${team.name} -${deduct.toLocaleString()} 골드${r.refund?` (힐러 환급 +${r.refund.toLocaleString()})` : ''}`,
              ts:Date.now()
            }});
          }

        } else if (r.action === 'fate') {
          addLog(`${team.name} 운명카드: ${r.fateCard}`, 'ok');
          update(ref(db,'gameState'), { lastEvent: {
            type:'fate', title:'운명카드 🃏', msg:`${team.name}: ${r.fateCard}`, ts:Date.now()
          }});

        } else if (r.action === 'auction') {
          addLog(`${team.name} 경매 — MC가 직접 처리`, 'sys');
          update(ref(db,'gameState'), { lastEvent: {
            type:'auction', title:'경매 🏆', msg:`${team.name} 경매 진행 중!`, ts:Date.now()
          }});

        } else if (r.action === 'plunder' && r.loot) {
          const victim = teamsData[r.victimId];
          if (victim) {
            await update(ref(db,`teams/${r.victimId}`), { gold: Math.max(0,(victim.gold||0)-r.loot) });
            await update(ref(db,`teams/${r.tid}`),      { gold: (team.gold||0)+r.loot });
            addLog(`${team.name} → ${r.victimName} 약탈 +${r.loot.toLocaleString()} 골드`, 'ok');
          }
          update(ref(db,'gameState'), { lastEvent: {
            type:'plunder', title:'약탈 성공! 🏴‍☠️', msg:r.resultText, ts:Date.now()
          }});
        }

        // 확정 후 판정 박스 초기화
        pendingResult = null;
        renderJudgeBox();
        addLog(`✅ ${team.name} 처리 완료 — "다음 팀 →" 버튼을 누르세요`, 'sys');

      } catch(e) {
        addLog(`오류 발생: ${e.message}`, 'err');
        console.error(e);
      }
    };

    // ── 다음 라운드 ──────────────────────────────────────────
    window.nextRound = function() {
      calcRoundPoints();
      const next = (gameState.currentRound||1)+1;
      if (next > 6) { alert('모든 라운드 완료! 보스전을 시작하세요.'); return; }
      update(ref(db,'gameState'), {
        currentRound:next, phase:'selecting',
        selections:null, currentTeamTurn:null,
        currentTeamIndex:0, selectedAction:null, actingTeam:null
      });
      currentJudgeTid = null; currentJudgeAction = null; pendingResult = null;
      document.getElementById('judgeTeamName').textContent   = '대기 중...';
      document.getElementById('judgeTeamAction').textContent = '결과 처리 시작 버튼을 누르세요';
      document.getElementById('judgeTeamGold').textContent   = '';
      renderJudgeBox();
      addLog(`R${next} 시작 — 전 팀 동시 선택!`, 'sys');
    };

    // ── 라운드 포인트 계산 ───────────────────────────────────
    function calcRoundPoints() {
      const round = gameState.currentRound||1;
      if (round===1) { addLog('R1 튜토리얼 — 포인트 없음', 'sys'); return; }
      const sorted = Object.entries(teamsData).sort((a,b)=>(b[1].gold||0)-(a[1].gold||0));
      if (round===5) {
        sorted.forEach(([id,t]) => update(ref(db,`teams/${id}`),{points:(t.points||0)+3}));
        addLog('R5 스페셜 — 전 팀 +3점!', 'sys'); return;
      }
      const BASE=[3,2,1,0]; const bonus = round===3?1:0;
      sorted.forEach(([id,t],i) => update(ref(db,`teams/${id}`),{points:(t.points||0)+(BASE[i]||0)+bonus}));
      addLog(`R${round} 포인트 지급${bonus?' (+1 보너스)':''}`, 'sys');
    }

    // ── 보스전 ───────────────────────────────────────────────
    window.startBoss = function() {
      const cnt    = Object.keys(teamsData).length;
      const bossHP = cnt*10000;
      update(ref(db,'gameState'), { phase:'boss', bossHP, bossHPMax:bossHP, selections:null });
      document.getElementById('bossSection').style.display  = 'block';
      document.getElementById('finalSection').style.display = 'block';
      addLog(`보스전 시작! HP: ${bossHP.toLocaleString()}`, 'sys');
    };

    function updateBossSection() {
      if (gameState.phase !== 'boss') return;
      document.getElementById('bossSection').style.display  = 'block';
      document.getElementById('finalSection').style.display = 'block';
      const hp=gameState.bossHP||0, max=gameState.bossHPMax||1;
      document.getElementById('bossHpFill').style.width = Math.max(0,(hp/max)*100)+'%';
      document.getElementById('bossHpText').textContent = `HP: ${hp.toLocaleString()} / ${max.toLocaleString()}`;
    }

    window.dealBossDamage = function() {
      const dmg=parseInt(document.getElementById('bossDmgInput').value)||0;
      const tid=document.getElementById('bossDmgTeam').value;
      const team=teamsData[tid];
      if (!team||dmg<=0) return;
      const newHP=Math.max(0,(gameState.bossHP||0)-dmg);
      update(ref(db,`teams/${tid}`),{bossDamage:(team.bossDamage||0)+dmg});
      update(ref(db,'gameState'),{bossHP:newHP});
      addLog(`${team.name} 보스 -${dmg.toLocaleString()} DMG`, 'ok');
    };

    // ── 최종 점수 ────────────────────────────────────────────
    window.calcFinal = function() {
      const totalDmg = Math.max(1,Object.values(teamsData).reduce((s,t)=>s+(t.bossDamage||0),0));
      const results  = Object.entries(teamsData).map(([id,t]) => {
        const ptScore   = (t.points||0)*0.5;
        const goldScore = Math.min(10,Math.floor((t.gold||0)/1000))*0.2;
        const bossScore = ((t.bossDamage||0)/totalDmg)*15*0.3;
        return {name:t.name,job:t.job,ptScore,goldScore,bossScore,total:ptScore+goldScore+bossScore};
      }).sort((a,b)=>b.total-a.total);
      document.getElementById('finalScores').innerHTML = results.map((r,i) => `
        <div style="padding:8px;border-radius:8px;margin-bottom:6px;background:#0f0f1a;border:1px solid ${i===0?'#ffd700':'#333'}">
          <div style="font-size:13px;font-weight:bold;color:${i===0?'#ffd700':'white'}">
            ${['🥇','🥈','🥉'][i]||''} ${r.name} (${JOB_NAMES[r.job]||'?'})
          </div>
          <div style="font-size:11px;color:#aaa;margin-top:4px;">
            포인트 ${r.ptScore.toFixed(1)} + 골드 ${r.goldScore.toFixed(1)} + 보스 ${r.bossScore.toFixed(1)}
            = <span style="color:#ffd700;font-weight:bold;">${r.total.toFixed(2)}점</span>
          </div>
        </div>`).join('');
      addLog('최종 점수 계산 완료', 'sys');
    };

    // ── 골드/포인트 조정 ─────────────────────────────────────
    window.adjustGold = function(sign) {
      const tid=document.getElementById('goldTeamSel').value;
      const amount=parseInt(document.getElementById('goldAmount').value)||0;
      const team=teamsData[tid]; if (!team) return;
      update(ref(db,`teams/${tid}`),{gold:Math.max(0,(team.gold||0)+sign*amount)});
      addLog(`${team.name} 골드 ${sign>0?'+':''}${sign*amount}`,sign>0?'ok':'err');
    };

    window.adjustPoints = function(sign) {
      const tid=document.getElementById('ptTeamSel').value;
      const amount=parseInt(document.getElementById('ptAmount').value)||0;
      const team=teamsData[tid]; if (!team) return;
      update(ref(db,`teams/${tid}`),{points:Math.max(0,(team.points||0)+sign*amount)});
      addLog(`${team.name} 포인트 ${sign>0?'+':''}${sign*amount}`,sign>0?'ok':'err');
    };

    // ── 이벤트 카드 ──────────────────────────────────────────
    document.getElementById('eventGrid').innerHTML = EVENTS.map(e=>`
      <div class="event-btn" onclick="fireEvent('${e.key}')">
        <div class="event-icon">${e.icon}</div>
        <div class="event-name" style="color:${e.color}">${e.name}</div>
        <div class="event-desc">${e.desc}</div>
      </div>`).join('');

    window.fireEvent = function(key) {
      const sorted=Object.entries(teamsData).sort((a,b)=>(b[1].points||0)-(a[1].points||0));
      if (!sorted.length) return;
      const [topId,top]=sorted[0];
      const [lastId,last]=sorted[sorted.length-1];
      const aid=currentJudgeTid||gameState.currentTeamTurn;
      const acting=aid?teamsData[aid]:null;

      if      (key==='gold2x' &&acting){update(ref(db,`teams/${aid}`),{gold:(acting.gold||0)*2});addLog(`${acting.name} 골드 2배!`,'ok');}
      else if (key==='curse')          {const c=Math.round((top.gold||0)*0.2);update(ref(db,`teams/${topId}`),{gold:(top.gold||0)-c});addLog(`${top.name} -20% 저주`,'err');}
      else if (key==='steal')          {const a=Math.round((top.gold||0)*0.1);update(ref(db,`teams/${topId}`),{gold:(top.gold||0)-a});update(ref(db,`teams/${lastId}`),{gold:(last.gold||0)+a});addLog(`부의 이전 ${top.name}→${last.name}`,'ok');}
      else if (key==='genius'&&acting) {addLog(`${acting.name} 다음 퀘스트 자동성공 부여`,'ok');}
      else if (key==='reverse')        {const d=Math.floor(((top.points||0)-(last.points||0))/2);update(ref(db,`teams/${topId}`),{points:(top.points||0)-d});update(ref(db,`teams/${lastId}`),{points:(last.points||0)+d});addLog('운명의 역전 발동','sys');}
      else if (key==='allgold')        {Object.entries(teamsData).forEach(([id,t])=>update(ref(db,`teams/${id}`),{gold:(t.gold||0)+500}));addLog('전 팀 +500 골드','ok');}
      update(ref(db,'gameState'),{lastEvent:{type:key,ts:Date.now()}});
    };

    // ── 팀 목록 / 셀렉트 ────────────────────────────────────
    function renderTeamList() {
      const sorted=Object.entries(teamsData).sort((a,b)=>(b[1].points||0)-(a[1].points||0));
      document.getElementById('teamList').innerHTML = sorted.map(([id,t],i) => `
        <div class="team-row ${currentJudgeTid===id?'active-turn':''} ${t.job==='pirate'?'pirate-row':''}">
          <div class="team-job-icon">${JOB_ICONS[t.job]||'❓'}</div>
          <div class="team-name-cell">${t.name} <span>(${JOB_NAMES[t.job]||'?'}) +${t.itemLevel||0}강</span></div>
          <div class="team-gold-cell">💰${(t.gold||0).toLocaleString()}</div>
          <div class="team-pt-cell">⭐${t.points||0}pt</div>
          <div style="font-size:16px;">${['🥇','🥈','🥉'][i]||(i+1)+'위'}</div>
        </div>`).join('') || '<div style="color:#555;font-size:12px;padding:8px;">참가 팀 없음</div>';
    }

    function renderSelects() {
      const opts=Object.entries(teamsData).map(([id,t])=>`<option value="${id}">${t.name} (${JOB_NAMES[t.job]||'?'})</option>`).join('');
      ['goldTeamSel','ptTeamSel','bossDmgTeam'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts;});
    }

    // ── 리셋 ─────────────────────────────────────────────────
    window.toggleReset = function() {
      const el=document.getElementById('resetConfirm');
      el.style.display=el.style.display==='none'?'block':'none';
    };
    window.resetGame = function() {
      set(ref(db,'teams'),null);
      set(ref(db,'gameState'),{phase:'lobby',currentRound:0});
      currentJudgeTid=null; currentJudgeAction=null; pendingResult=null;
      renderJudgeBox();
      document.getElementById('resetConfirm').style.display='none';
      document.getElementById('bossSection').style.display='none';
      document.getElementById('finalSection').style.display='none';
      addLog('게임 리셋 완료','sys');
    };

    // ── 로그 ─────────────────────────────────────────────────
    function addLog(msg,type='') {
      const box=document.getElementById('logBox');
      const time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const line=document.createElement('div');
      line.className=`log-line ${type}`;
      line.textContent=`[${time}] ${msg}`;
      box.prepend(line);
    }

    addLog('관리자 페이지 로드됨','sys');
  </script>
</body>
</html>
